<!DOCTYPE html>
<html>
<head>
  <title>Gerador de Codiguin PRO MAX</title>
  <style>
    body {
      background: black;
      color: #00ffcc;
      text-align: center;
      font-family: monospace;
    }

    h1 {
      color: gold;
      text-shadow: 0 0 15px gold;
    }

    #codigo {
      margin-top: 20px;
      font-size: 32px;
      letter-spacing: 5px;
      text-shadow: 0 0 10px #00ffcc;
    }

    button {
      margin: 10px;
      padding: 12px;
      font-size: 16px;
      background: #00ffcc;
      color: black;
      border: none;
      border-radius: 10px;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #00ffcc;
      border-radius: 10px;
      width: 85%;
      margin-left: auto;
      margin-right: auto;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h1>🔥 GERADOR DE CODIGUIN PRO MAX 🔥</h1>

<div class="box">
  <p id="codigo">---- ---- ----</p>
</div>

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<p id="limite">Tentativas restantes: 3</p>

<div class="box">
  <p>🎁 Recompensa: <span id="reward">---</span></p>
  <p>📅 Validade: 24h</p>
  <p>⚡ Status: Ativo</p>
</div>

<button id="extra" class="hidden" onclick="liberar()">🔓 LIBERAR MAIS TENTATIVAS</button>

<script>
let tentativas = 3;

function gerarParte(t) {
  let c = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let r = "";
  for (let i = 0; i < t; i++) {
    r += c.charAt(Math.floor(Math.random() * c.length));
  }
  return r;
}

function recompensa() {
  let itens = [
    "💎 100 Diamantes",
    "🎁 Skin Rara",
    "🔥 Emote Exclusivo",
    "💰 500 Ouro",
    "⚡ Caixa Misteriosa"
  ];
  return itens[Math.floor(Math.random() * itens.length)];
}

function gerar() {
  if (tentativas <= 0) {
    document.getElementById("codigo").innerText = "LIMITE ATINGIDO";
    document.getElementById("extra").classList.remove("hidden");
    return;
  }

  document.getElementById("codigo").innerText = "GERANDO...";
  
  setTimeout(() => {
    let cod =
      gerarParte(4) + "-" +
      gerarParte(4) + "-" +
      gerarParte(4);

    document.getElementById("codigo").innerText = cod;
    document.getElementById("reward").innerText = recompensa();

    tentativas--;
    document.getElementById("limite").innerText =
      "Tentativas restantes: " + tentativas;
  }, 800);
}

function copiar() {
  let texto = document.getElementById("codigo").innerText;
  navigator.clipboard.writeText(texto);
  alert("Copiado!");
}

function liberar() {
  alert("Assista um vídeo para liberar mais!");
  tentativas = 3;
  document.getElementById("limite").innerText =
    "Tentativas restantes: " + tentativas;
  document.getElementById("extra").classList.add("hidden");
}
</script>

</body>
</html>
